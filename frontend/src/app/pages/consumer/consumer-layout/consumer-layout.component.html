<div class="flex h-screen bg-slate-50 dark:bg-slate-950 overflow-hidden transition-colors duration-300">
  <!-- Desktop sidebar -->
  <app-consumer-sidebar class="hidden lg:flex"></app-consumer-sidebar>

  <div class="flex-1 flex flex-col overflow-y-auto">
    <header
      class="sticky top-0 z-40 bg-white/95 dark:bg-slate-900/95 backdrop-blur-sm border-b border-slate-200 dark:border-slate-800 shadow-sm transition-colors duration-300">
      <div class="max-w-full mx-auto px-4 sm:px-6 lg:px-8 py-4">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-4">
            <button (click)="toggleSidebar()"
              class="p-2 rounded-xl text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition lg:hidden">
              <lucide-icon name="menu" class="w-6 h-6"></lucide-icon>
            </button>

            <div>
              <h1 class="text-2xl md:text-3xl font-black text-slate-900 dark:text-white tracking-tight">
                {{ 'COMMON.CONSUMER_DASHBOARD' | translate }}
              </h1>
              <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">
                {{ 'DASHBOARD.WELCOME' | translate }},
                <span class="font-bold text-indigo-600 dark:text-indigo-400">{{ currentConsumerName() }}</span>
              </p>
            </div>
          </div>

          <div class="flex items-center gap-4">
            <div
              class="hidden sm:flex items-center gap-2 bg-emerald-50 dark:bg-emerald-500/10 px-4 py-2 rounded-full border border-emerald-100 dark:border-emerald-500/20 shadow-sm transition-colors duration-300">
              <div class="relative">
                <div class="w-2.5 h-2.5 bg-emerald-500 rounded-full"></div>
                <div class="w-2.5 h-2.5 bg-emerald-500 rounded-full absolute inset-0 animate-ping opacity-75"></div>
              </div>
              <span class="text-xs font-black uppercase tracking-wider text-emerald-700 dark:text-emerald-400">{{
                'DASHBOARD.STATUS_ONLINE' | translate }}</span>
            </div>

            <button
              class="relative p-2 rounded-xl text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition">
              <lucide-icon name="activity" class="w-6 h-6"></lucide-icon>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="flex-1 bg-slate-50 dark:bg-slate-950 transition-colors duration-300">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <router-outlet></router-outlet>
      </div>
    </main>

    <footer
      class="sticky bottom-0 z-30 bg-white/90 dark:bg-slate-900/90 backdrop-blur-sm border-t border-slate-200 dark:border-slate-800 px-4 sm:px-6 lg:px-8 py-4 transition-colors duration-300">
      <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
        <p class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest">
          © 2025 <span class="text-indigo-600 dark:text-indigo-400">FarmChainX</span> &bull; {{ 'DASHBOARD.FOOTER_TAG' |
          translate }}
        </p>
        <div
          class="flex items-center gap-6 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest">
          <a href="#" class="hover:text-indigo-600 dark:hover:text-indigo-400 transition">{{ 'COMMON.DOCUMENTATION' |
            translate }}</a>
          <span class="text-slate-300 dark:text-slate-700 font-light">•</span>
          <a href="#" class="hover:text-indigo-600 dark:hover:text-indigo-400 transition">{{ 'COMMON.SUPPORT' |
            translate }}</a>
        </div>
      </div>
    </footer>
  </div>

  <!-- mobile overlay & sidebar -->
  <div *ngIf="sidebarOpen" class="fixed inset-0 z-50 lg:hidden" (click)="toggleSidebar()">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>

    <div
      class="absolute left-0 top-0 h-full w-80 bg-white dark:bg-slate-900 shadow-2xl transform transition-transform duration-300"
      (click)="$event.stopPropagation()">
      <app-consumer-sidebar></app-consumer-sidebar>
    </div>
  </div>
</div>
