<div
  class="min-h-screen bg-slate-50 dark:bg-slate-900 flex items-center justify-center px-6 relative overflow-hidden transition-colors duration-300">

  <!-- Subtle background shapes -->
  <div class="absolute inset-0 -z-10 overflow-hidden pointer-events-none">
    <div
      class="absolute -top-32 -right-32 w-96 h-96 bg-indigo-100 dark:bg-indigo-900/30 rounded-full opacity-60 blur-3xl transition-colors duration-300">
    </div>
    <div
      class="absolute -bottom-24 -left-24 w-80 h-80 bg-blue-100 dark:bg-blue-900/30 rounded-full opacity-50 blur-3xl transition-colors duration-300">
    </div>
  </div>

  <div class="w-full max-w-md animate-fade-in-up mt-8 md:mt-0">
    <!-- Logo / Brand -->
    <div class="text-center mb-8">
      <div
        class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 dark:bg-indigo-500 rounded-2xl shadow-lg mb-4">
        <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
        </svg>
      </div>
      <h1 class="text-3xl font-black text-indigo-700 dark:text-indigo-400 tracking-tight">FarmChainX</h1>
      <p class="text-slate-500 dark:text-slate-400 mt-1 text-sm font-medium">Agricultural Supply Chain Platform</p>
    </div>

    <!-- Card -->
    <div
      class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-xl shadow-slate-200/60 dark:shadow-none p-8 transition-colors duration-300">
      <h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-1">Sign In</h2>
      <p class="text-slate-500 dark:text-slate-400 text-sm mb-6">Welcome back — enter your credentials to continue.</p>

      <!-- Inline error banner -->
      <div *ngIf="errorMessage"
        class="flex items-start gap-3 bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/20 text-red-700 dark:text-red-400 rounded-xl px-4 py-3 mb-5 text-sm font-medium">
        <svg class="w-5 h-5 mt-0.5 shrink-0 text-red-500 dark:text-red-400" fill="none" stroke="currentColor"
          viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span>{{ errorMessage }}</span>
      </div>

      <form (ngSubmit)="login()" #f="ngForm" autocomplete="off" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Email Address</label>
          <input
            class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-xl placeholder-slate-400 dark:placeholder-slate-500 text-slate-800 dark:text-white text-sm focus:outline-none focus:border-indigo-600 dark:focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-colors"
            name="email" id="email" type="email" placeholder="your.email@example.com" [(ngModel)]="email" required />
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Password</label>
          <input
            class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-xl placeholder-slate-400 dark:placeholder-slate-500 text-slate-800 dark:text-white text-sm focus:outline-none focus:border-indigo-600 dark:focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-colors"
            name="password" id="password" type="password" placeholder="Enter your password" [(ngModel)]="password"
            required />
        </div>

        <button type="submit" [disabled]="f.invalid || loading" id="login-btn"
          class="w-full bg-indigo-600 dark:bg-indigo-500 hover:bg-indigo-700 dark:hover:bg-indigo-600 text-white font-semibold text-sm py-3.5 rounded-xl shadow-md shadow-indigo-200 dark:shadow-none transform hover:scale-[1.01] transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100 flex items-center justify-center gap-2">
          <svg *ngIf="loading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          {{ loading ? 'Signing in...' : 'Sign In to Dashboard' }}
        </button>
      </form>

      <div class="mt-6 pt-6 border-t border-slate-100 dark:border-slate-700 text-center transition-colors duration-300">
        <p class="text-slate-500 dark:text-slate-400 text-sm mb-3">New to FarmChainX?</p>
        <a routerLink="/register" id="create-account-link"
          class="inline-block w-full text-center bg-slate-100 dark:bg-slate-700/50 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-semibold text-sm py-3 rounded-xl transition-all duration-200 no-underline">
          Create Free Account
        </a>
      </div>
    </div>

    <p
      class="text-center text-slate-400 dark:text-slate-500 text-xs mt-6 flex items-center justify-center gap-1.5 pb-8 md:pb-0">
      <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd"
          d="M2.166 4.999A11.954 11.954 0 0110 1.944 11.954 11.954 0 0117.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
          clip-rule="evenodd" />
      </svg>
      Secured by Database Technology
    </p>
  </div>
</div>
